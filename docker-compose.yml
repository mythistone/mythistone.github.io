services:
  mythistone-collector:
    image: ghcr.io/mythistone/mythistone-collector:latest
    container_name: mythistone-collector
    network_mode: "host"
    restart: always
    volumes:
      - ./.env:/app/.env:ro
      - ./runs:/data/runs
    env_file: .env 
    environment:
      - GIT_BRANCH=main
      - CHECK_INTERVAL=60
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    restart: always
    env_file: .env   
    network_mode: "host"          
    environment:
      - WATCHTOWER_POLL_INTERVAL=600
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_TIMEOUT=1200
      - WATCHTOWER_NOTIFICATION_URL=discord://${WEBHOOK_TOKEN}@${WEBHOOK_CHANNEL}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

