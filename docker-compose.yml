services:
  mythistone-collector:
    image: ghcr.io/mythistone/mythistone-collector:latest
    container_name: mythistone-collector
    restart: always
    volumes:
      - ./.env:/app/.env:ro
      - ./runs:/data/runs
    environment:
      - GIT_BRANCH=main
      - CHECK_INTERVAL=60
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    restart: always
    environment:
      - WATCHTOWER_CLEANUP=true           # remove old images
      - WATCHTOWER_POLL_INTERVAL=60       # seconds
      - WATCHTOWER_TIMEOUT=120            # seconds for docker operations
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

