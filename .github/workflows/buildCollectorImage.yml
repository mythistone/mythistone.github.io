name: Build and publish collector image

on:
  push:
    paths:
      - 'backend_scripts/collectLeaderboardData.py'
      - 'data/static/dungeons.json'
      - 'Dockerfile'
      - 'entrypoint.sh'
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image to GHCR
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ghcr.io/mythistone/mythistone-collector:latest
            ghcr.io/mythistone/mythistone-collector:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
