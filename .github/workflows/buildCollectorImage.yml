name: Build and publish collector image

on:
  push:
    paths:
      - 'backend_scripts/collectLeaderboardData.py'
      - 'backend_scripts/databaseConnector.py'
      - 'backend_scripts/discordHandler.py'
      - 'backend_scripts/stats.py'
      - 'data/static/dungeons.json'
      - 'Dockerfile'
      - 'entrypoint.sh'
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Read commit message (full + one-line)
        id: commit_msg
        run: |
          # full (multiline) commit message, safe output
          echo "full<<'EOF'" >> $GITHUB_OUTPUT
          git log -1 --pretty=%B >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          # one-line version for labels (no quotes/newlines)
          oneline=$(git log -1 --pretty=%B | tr '\n' ' ' | sed -E 's/  +/ /g' | sed -E "s/\"/'/g")
          echo "one=$oneline" >> $GITHUB_OUTPUT

      - name: Build and push image to GHCR
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ghcr.io/mythistone/mythistone-collector:latest
            ghcr.io/mythistone/mythistone-collector:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.description=${{ steps.commit_msg.outputs.one }}
