name: WoW M+ Data Collector

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */12 * * *'  # every 4 hours

jobs:
  collect:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        region: [us, eu, kr, tw]
    env:
      BLIZ_CLIENT_ID_EU: ${{ secrets.BLIZ_CLIENT_ID_EU }}
      BLIZ_CLIENT_ID_KR: ${{ secrets.BLIZ_CLIENT_ID_KR }}
      BLIZ_CLIENT_ID_TW: ${{ secrets.BLIZ_CLIENT_ID_TW }}
      BLIZ_CLIENT_ID_US: ${{ secrets.BLIZ_CLIENT_ID_US }}
      BLIZ_CLIENT_SECRET_EU: ${{ secrets.BLIZ_CLIENT_SECRET_EU }}
      BLIZ_CLIENT_SECRET_KR: ${{ secrets.BLIZ_CLIENT_SECRET_KR }}
      BLIZ_CLIENT_SECRET_TW: ${{ secrets.BLIZ_CLIENT_SECRET_TW }}
      BLIZ_CLIENT_SECRET_US: ${{ secrets.BLIZ_CLIENT_SECRET_US }}
      RAIDERIO_API_KEY: ${{ secrets.RAIDERIO_API_KEY }}
      REGION: ${{ matrix.region }}
      LOCALE: 'en_US'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Fetch runs-branch history
        run: |
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git fetch --no-tags --depth=1 origin runs:runs

      - name: Populate existing run-history
        run: |
          # ensure the directory exists
          mkdir -p data
          # overwrite ./data/runs with whatever is on runs:data/runs
          git checkout runs -- data/runs || echo "No prior run-history—starting fresh"

      - name: Set up Python
        uses: actions/setup-python@v4

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install aiohttp aiolimiter mysql-connector-python aiohttp_retry

      - name: Create data directories
        run: |
          mkdir -p data/runs
          mkdir -p data/runs/${{ env.REGION }}
          mkdir -p data/${{ env.REGION }}

      - name: Run data collector
        run: |
          python -u backend_scripts/collectLeaderboardData.py  \
          --database_host ${{secrets.DATABASE_HOST}}  \
          --database_user ${{secrets.DATABASE_USER}} \
          --database_password ${{secrets.DATABASE_PASSWORT}} \
          --database ${{secrets.DATABASE_NAME}} \
          --region ${{ env.REGION }}

      # - name: Install GH Actions Artifact CLI
      #   uses: lhotari/gh-actions-artifact-client@v2

      # - name: Build realms list and upload artifacts
