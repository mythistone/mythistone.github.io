      #       realm=$(basename "$path")
      #       REALMS+=("$REGION:$realm")

      #       artifact_name="mplus-data-${REGION}-${realm}"
      #       echo "::group::uploading $artifact_name"
      #       tar -C data/${REGION} -cf - "$realm" \
      #         | gh-actions-artifact-client.js upload "$artifact_name"
      #       echo "::endgroup::"
      #     done

      #     # (fail early if we didn't find any realms)
      #     if [ "${#REALMS[@]}" -eq 0 ]; then
      #       echo "No realms found in data/*, aborting" >&2
      #       exit 1
      #     fi

      #     printf '%s\n' "${REALMS[@]}" \
      #     | jq -R . | jq -s . \
      #         > realms.json

      #     echo "realms<<EOF" >> $GITHUB_OUTPUT
      #     cat realms.json >> $GITHUB_OUTPUT
      #     echo "EOF" >> $GITHUB_OUTPUT

      # - name: Upload this region's realms.json
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: realms-${{ env.REGION }}
      #     path: realms.json

      # - name: Debug list all files in workspace
      #   run: |
      #     echo "=== WORKSPACE ROOT ==="
      #     ls -R .
      #     echo "=== data directory ==="
      #     ls -R data

      - name: Commit this region's seen-runs history
        run: |
          TMP=$(mktemp -d)
          ORIG="https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"

          # clone the runs branch (or init it)
          if git ls-remote --heads "$ORIG" runs | grep -q runs; then
            git clone --depth=1 --branch runs "$ORIG" "$TMP"
          else
            git clone --depth=1 --branch main "$ORIG" "$TMP"
            (cd "$TMP" && git checkout --orphan runs && git rm -rf .)
          fi

          # copy in only this region's new seen-runs
          mkdir -p "$TMP/data/runs/${REGION}"
          rsync -a data/runs/${REGION}/ "$TMP/data/runs/${REGION}/"

          # commit & push
          cd "$TMP"
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -A data/runs/${REGION}
          if git diff --cached --quiet; then
            echo "No new runs for region ${REGION}"
          else
            git commit -m "Update seen-runs for region ${REGION}"

            # try up to 5 times to pull-rebase & push
            for attempt in {1..5}; do
              echo "Attempt $attempt to push runs branch…"
              # integrate any remote changes
              git pull --rebase origin runs || echo "Rebase failed, will retry"
              if git push origin HEAD:runs; then
                echo "Pushed successfully on attempt $attempt"
                break
              else
                echo "Push rejected; retrying in 2s…"
                sleep 2
              fi
            done

            # if still not on remote after 5 attempts, fail the job
            if ! git rev-parse --verify origin/runs >/dev/null 2>&1; then
              echo "Failed to push runs branch after 5 attempts." >&2
              exit 1
            fi
          fi
          cd -
          rm -rf "$TMP"


